<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Suppress Referer on all sub-resource requests (images, etc.).
         Publisher CDNs (ACS, RSC, Wiley) block cross-origin Referer headers.
         This makes image requests look like direct browser access, matching
         how native RSS readers behave. The per-element referrerpolicy attribute
         on <img> is sometimes ignored by macOS Safari; the document-level meta
         tag is respected universally. -->
    <meta name="referrer" content="no-referrer" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA: installable as a standalone app. Once installed (iOS: Share →
         Add to Home Screen; desktop Chrome/Edge: Install icon in the URL
         bar), the app launches in its own window with no browser chrome
         and no address bar. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lit Tracker" />

    <title>Literature Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
